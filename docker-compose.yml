version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: enterprise-qa-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    container_name: enterprise-qa-app
    ports:
      - "5000:5000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - DATABASE_URL=sqlite:///data/db_enterprise_qa.db
    volumes:
      - app-data:/app/data
      - app-uploads:/app/uploads
      - app-chroma:/app/db_enterprise_qa_chroma
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama-data:
  app-data:
  app-uploads:
  app-chroma:
